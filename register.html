<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Institution Register - CertiLedger</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="overlay">

    <div class="login-box">

        <h2>Institution Register</h2>

        <input type="text" placeholder="Institution Name">

        <input type="email" placeholder="Institution Email">

        <input type="text" placeholder="Institution ID">

        <input type="password" placeholder="Password">

        <input type="password" placeholder="Confirm Password">

        <button class="login-btn">Register</button>

        <p class="small-text">
            Already registered?
            <a href="institution-login.html">Login here</a>
        </p>

    </div>

</div>

</body>
</html>
